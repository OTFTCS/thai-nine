<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai Classifiers Cheat Sheet — Concept D v2</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
  @page {
    size: A4;
    margin: 10mm 10mm 10mm 10mm;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brand-blue:  #1E3A8A;
    --brand-red:   #DC2626;
    --ink:         #1a1a1a;
    --ink-2:       #4a4a4a;
    --ink-3:       #7a7a7a;
    --bg:          #ffffff;
    --card-bg:     #ffffff;
    --rule:        #e6ded0;
  }

  body {
    font-family: 'Sarabun', sans-serif;
    font-size: 9pt;
    line-height: 1.4;
    color: var(--ink);
    background: var(--bg);
  }

  /* ── Page container: one per printed page so header repeats ── */
  .page {
    break-after: page;
    page-break-after: always;
    display: flex;
    flex-direction: column;
  }
  .page:last-child {
    break-after: auto;
    page-break-after: auto;
  }

  /* ── Per-page header: title top-left → middle, logo top-right ── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    border-bottom: 1.25pt solid var(--brand-blue);
    padding-bottom: 3px;
    margin-bottom: 6px;
    background: #ffffff;
  }
  .page-header-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
  }
  .page-title {
    font-family: 'Fraunces', serif;
    font-size: 42pt;
    font-weight: 700;
    line-height: 1.0;
    letter-spacing: -0.5px;
    color: var(--brand-blue);
  }
  .page-subtitle {
    font-size: 7.5pt;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--brand-red);
    white-space: nowrap;
  }
  .page-logo {
    max-height: 112px;
    width: auto;
    max-width: 320px;
    object-fit: contain;
    flex-shrink: 0;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
    flex: 1;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border-radius: 6px;
    overflow: hidden;
    break-inside: avoid;
    page-break-inside: avoid;
    border: 0.5pt solid var(--rule);
    display: flex;
    flex-direction: column;
  }

  /* Card header (alternating blue/red) */
  .card-header {
    padding: 11px 10px 10px;
    color: #fff;
    display: grid;
    grid-template-columns: minmax(42px, auto) 1fr auto;
    column-gap: 10px;
    align-items: center;
    min-height: 74px;
  }
  .card-header.blue { background: var(--brand-blue); }
  .card-header.red  { background: var(--brand-red); }

  .card-glyph {
    font-size: 28pt;
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: -0.5px;
    grid-row: span 2;
    align-self: center;
    white-space: nowrap;
    padding: 2px 0 1px;
  }
  .card-glyph.compact { font-size: 15pt; line-height: 1.25; white-space: normal; padding: 3px 0 2px; }
  .card-translit {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16pt;
    font-weight: 700;
    line-height: 1.15;
    opacity: 1;
  }
  .card-desc {
    font-size: 9pt;
    line-height: 1.25;
    opacity: 0.95;
    margin-top: 2px;
  }
  .card-meta {
    grid-row: span 2;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    white-space: nowrap;
  }
  .card-gloss {
    font-size: 7pt;
    font-weight: 800;
    letter-spacing: 1.1px;
    background: rgba(255, 255, 255, 0.22);
    padding: 2px 7px;
    border-radius: 10px;
  }
  /* ── Examples ── */
  .card-examples {
    padding: 3px 10px 1px;
    flex: 1;
  }
  .example-row {
    display: grid;
    grid-template-columns: 20px auto 1fr auto;
    column-gap: 7px;
    align-items: center;
    padding: 1px 0;
    border-bottom: 0.25pt solid var(--rule);
  }
  .example-row:last-child { border-bottom: none; }
  .example-icon {
    width: 20px;
    height: 20px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .example-icon.missing {
    width: 20px;
    height: 20px;
    background: #f0e8d8;
    border-radius: 50%;
    display: inline-block;
  }
  .example-row .thai {
    font-size: 11pt;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
  }
  .example-row .translit {
    font-size: 8.5pt;
    color: var(--ink-2);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .example-row .english {
    font-size: 9.5pt;
    color: var(--ink-3);
    text-align: right;
    white-space: nowrap;
  }

  /* ── Sentence block ── */
  .card-sentence {
    padding: 4px 10px 5px 11px;
    border-left: 2pt solid;
    margin: 2px 10px 5px;
    background: rgba(0, 0, 0, 0.02);
    border-radius: 0 3px 3px 0;
  }
  .card-sentence.blue { border-left-color: var(--brand-blue); }
  .card-sentence.red  { border-left-color: var(--brand-red); }

  .card-sentence-label {
    font-size: 5.5pt;
    font-weight: 800;
    letter-spacing: 1.3px;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 1px;
  }
  .card-sentence-label.blue { color: var(--brand-blue); }
  .card-sentence-label.red  { color: var(--brand-red); }

  .card-sentence .sent-thai {
    font-size: 9pt;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.25;
  }
  .card-sentence .sent-translit {
    font-size: 7.5pt;
    font-weight: 500;
    color: var(--ink-2);
  }
  .card-sentence .sent-english {
    font-size: 7pt;
    color: var(--ink-3);
    font-style: italic;
  }
</style>
</head>
<body>

<div id="root"></div>

<script>
const data = CLASSIFIER_DATA;
const legacyImages = IMAGE_MAP_DATA;   // per-classifier hero images (unused in v2 cards, kept for future)
const exampleIcons = EXAMPLE_ICON_MAP_DATA;
const logoDataUri = "LOGO_DATA";

/* ── Classifier ordering ──
   Semantic flow: people → living → object → container → space → time → set.
   Not grouped by page chrome; just a sensible reading order. */
const ORDER = {
  'คน': 1, 'ตัว': 2, 'ต้น': 3,
  'อัน': 4, 'ใบ': 5, 'เล่ม': 6, 'ลูก': 7, 'ชิ้น': 8, 'เส้น': 9, 'คัน': 10, 'เครื่อง': 11,
  'แก้ว': 12, 'ขวด': 13, 'จาน / ชาม': 14, 'ถุง': 15,
  'แผ่น': 16, 'ห้อง': 17,
  'ครั้ง': 18, 'รอบ': 19, 'ที่': 20,
  'เรื่อง': 21, 'ฉบับ': 22, 'ชุด': 23, 'คู่': 24,
};

function iconHTML(slug) {
  const src = exampleIcons[slug];
  if (src) {
    return `<img class="example-icon" src="${src}" alt="">`;
  }
  // Missing — render placeholder dot, keeps row alignment
  return `<span class="example-icon missing" title="${slug}"></span>`;
}

const sorted = [...data.classifiers].sort((a, b) => (ORDER[a.thai] ?? 99) - (ORDER[b.thai] ?? 99));

const PER_PAGE = 6;
const pages = [];
for (let i = 0; i < sorted.length; i += PER_PAGE) {
  pages.push(sorted.slice(i, i + PER_PAGE));
}

/* ── Render each page ── */
const root = document.getElementById('root');
pages.forEach((pageClfs, pageIdx) => {
  const pageEl = document.createElement('section');
  pageEl.className = 'page';

  // Header
  pageEl.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">Thai Classifiers</div>
        <div class="page-subtitle">Cheat Sheet · ${String(pageIdx + 1).padStart(2, '0')} / ${String(pages.length).padStart(2, '0')}</div>
      </div>
      ${logoDataUri ? `<img class="page-logo" src="${logoDataUri}" alt="Immersion Thai with Nine">` : ''}
    </div>
    <div class="grid"></div>
  `;

  const grid = pageEl.querySelector('.grid');
  pageClfs.forEach((clf, idxOnPage) => {
    // Alternate blue/red by overall index (so page 2 starts where page 1 left off in colour rhythm)
    const globalIdx = pageIdx * PER_PAGE + idxOnPage;
    const colour = globalIdx % 2 === 0 ? 'blue' : 'red';

    const examplesHTML = clf.examples.map(ex => `
      <div class="example-row">
        ${iconHTML(ex.iconSlug)}
        <span class="thai">${ex.thai}</span>
        <span class="translit">${ex.translit}</span>
        <span class="english">${ex.english}</span>
      </div>
    `).join('');

    const sentenceHTML = clf.sentence ? `
      <div class="card-sentence ${colour}">
        <div class="card-sentence-label ${colour}">In a sentence</div>
        <div class="sent-thai">${clf.sentence.thai}</div>
        <div class="sent-translit">${clf.sentence.translit}</div>
        <div class="sent-english">${clf.sentence.english}</div>
      </div>
    ` : '';

    const cardEl = document.createElement('div');
    cardEl.className = 'card';
    // Compact glyph for dual-form classifiers (e.g. จาน / ชาม)
    const glyphClass = clf.thai.length > 4 ? 'card-glyph compact' : 'card-glyph';

    cardEl.innerHTML = `
      <div class="card-header ${colour}">
        <div class="${glyphClass}">${clf.thai}</div>
        <div>
          <div class="card-translit">${clf.translit}</div>
          <div class="card-desc">${clf.description}</div>
        </div>
        <div class="card-meta">
          <span class="card-gloss">${clf.gloss}</span>
        </div>
      </div>
      <div class="card-examples">${examplesHTML}</div>
      ${sentenceHTML}
    `;
    grid.appendChild(cardEl);
  });

  root.appendChild(pageEl);
});
</script>

</body>
</html>
