<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai Classifiers Cheat Sheet — Concept A</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
<style>
  @page {
    size: A4;
    margin: 12mm 14mm 14mm 14mm;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sarabun', sans-serif;
    font-size: 9pt;
    line-height: 1.5;
    color: #1a1a1a;
    background: #f5f7fa;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #003DA5 0%, #0055d4 100%);
    color: #fff;
    text-align: center;
    padding: 16px 20px 14px;
    border-radius: 16px;
    margin-bottom: 14px;
    position: relative;
  }
  .logo-placeholder {
    position: absolute;
    top: 10px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6pt;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
  }
  .logo-left { left: 14px; }
  .logo-right { right: 14px; }
  .header h1 {
    font-size: 22pt;
    font-weight: 800;
    letter-spacing: 0.3px;
  }
  .header .subtitle {
    font-size: 10pt;
    font-weight: 400;
    opacity: 0.9;
    margin-top: 2px;
  }
  .header .intro {
    font-size: 8.5pt;
    opacity: 0.7;
    margin-top: 4px;
    max-width: 460px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── Section Headers ── */
  .section-header {
    background: linear-gradient(90deg, #003DA5, #1a5dc9);
    color: #fff;
    font-size: 10pt;
    font-weight: 700;
    padding: 7px 16px;
    margin-top: 14px;
    margin-bottom: 12px;
    border-radius: 12px;
    letter-spacing: 0.5px;
    page-break-after: avoid;
  }
  .section-header.bonus {
    background: linear-gradient(90deg, #ED1C24, #f74a50);
  }

  /* ── Classifier Card ── */
  .card {
    display: flex;
    gap: 0;
    margin-bottom: 18px;
    border-radius: 14px;
    overflow: hidden;
    page-break-inside: avoid;
    break-inside: avoid;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .card-left {
    width: 150px;
    min-width: 150px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
  }
  .card.blue .card-left {
    background: linear-gradient(180deg, #e8f0fe 0%, #f0f4fa 100%);
    border-left: 5px solid #003DA5;
    border-radius: 14px 0 0 14px;
  }
  .card.red .card-left {
    background: linear-gradient(180deg, #fde8e8 0%, #fdf0f0 100%);
    border-left: 5px solid #ED1C24;
    border-radius: 14px 0 0 14px;
  }

  .clf-image {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 6px;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  .classifier-thai {
    font-size: 24pt;
    font-weight: 800;
    line-height: 1.15;
    color: #1a1a1a;
  }
  .classifier-translit {
    font-size: 11pt;
    font-weight: 700;
    color: #333;
    margin-top: 1px;
  }
  .classifier-gloss {
    display: inline-block;
    font-size: 7pt;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 5px;
    color: #fff;
  }
  .card.blue .classifier-gloss { background: #003DA5; }
  .card.red  .classifier-gloss { background: #ED1C24; }

  .classifier-desc {
    font-size: 7.5pt;
    color: #666;
    font-style: italic;
    margin-top: 5px;
    line-height: 1.3;
  }

  /* ── Examples ── */
  .card-right {
    flex: 1;
    padding: 10px 14px;
    display: flex;
    align-items: flex-start;
  }

  .examples-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 2px;
  }
  .examples-table tr {
    background: #f8f9fb;
    border-radius: 6px;
  }
  .examples-table tr:nth-child(even) {
    background: #fff;
  }
  .examples-table td {
    padding: 4px 8px;
    vertical-align: middle;
  }
  .examples-table tr td:first-child { border-radius: 6px 0 0 6px; }
  .examples-table tr td:last-child { border-radius: 0 6px 6px 0; }

  .ex-thai {
    font-size: 13pt;
    font-weight: 600;
    color: #1a1a1a;
    white-space: nowrap;
    width: 28%;
  }
  .ex-translit {
    font-size: 9.5pt;
    color: #333;
    font-weight: 700;
    width: 37%;
  }
  .ex-english {
    font-size: 8.5pt;
    color: #555;
    width: 35%;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 16px;
    padding: 10px 16px;
    background: linear-gradient(135deg, #003DA5 0%, #0055d4 100%);
    border-radius: 12px;
    color: #fff;
    font-size: 8.5pt;
  }
  .footer .brand {
    font-weight: 700;
    font-size: 10pt;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-placeholder logo-left">LOGO</div>
  <div class="logo-placeholder logo-right">LOGO</div>
  <h1>Thai Classifiers Cheat Sheet</h1>
  <div class="subtitle">19 Counter Words That Cover 95% of Thai Nouns</div>
  <div class="intro">Thai uses counter words ("classifiers") between numbers and nouns. These 19 cover almost everything you'll ever say.</div>
</div>

<div class="section-header">MAIN — 14 Everyday Classifiers</div>

<script>
const data = CLASSIFIER_DATA;
const images = IMAGE_MAP_DATA;

function getImageSrc(gloss) {
  const key = gloss.toLowerCase().replace(/-/g, '_');
  return images[key] || '';
}

function renderCard(clf, index, section) {
  const colorClass = section === 'BONUS' ? 'red' : (index % 2 === 0 ? 'blue' : 'red');
  const imgSrc = getImageSrc(clf.gloss);
  const imgTag = imgSrc ? `<img class="clf-image" src="${imgSrc}" alt="${clf.gloss}">` : '';

  const rows = clf.examples.map(ex => `
    <tr>
      <td class="ex-thai">${ex.thai}</td>
      <td class="ex-translit">${ex.translit}</td>
      <td class="ex-english">${ex.english}</td>
    </tr>
  `).join('');

  return `
    <div class="card ${colorClass}">
      <div class="card-left">
        ${imgTag}
        <div class="classifier-thai">${clf.thai}</div>
        <div class="classifier-translit">${clf.translit}</div>
        <span class="classifier-gloss">${clf.gloss}</span>
        <div class="classifier-desc">${clf.description}</div>
      </div>
      <div class="card-right">
        <table class="examples-table">${rows}</table>
      </div>
    </div>
  `;
}

data.sections.forEach(section => {
  if (section.name === 'BONUS') {
    document.write('<div class="section-header bonus">BONUS — ' + section.label + '</div>');
  }
  section.classifiers.forEach((clf, i) => {
    document.write(renderCard(clf, i, section.name));
  });
});
</script>

<div class="footer">
  <span class="brand">thaiwith.nine</span> — get free Thai PDFs, link in bio.
</div>

</body>
</html>
