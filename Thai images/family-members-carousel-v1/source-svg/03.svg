<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920"><style>.chip{font:700 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#4b2e1f}.heading{font:700 36px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#1f1a17}.title{font:700 78px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#1f1a17}.thai-title{font:700 54px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#b45d13}.en{font:700 30px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#8f4a11}.thai{font:700 44px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.thai-large{font:700 52px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.translit{font:400 26px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#5f524a}.translit-large{font:400 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#5f524a}.small{font:400 22px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#443832}.small-large{font:400 24px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#443832}.example{font:700 26px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.example-large{font:700 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.body{font:400 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#6d5f56}.body-small{font:400 24px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#5f524a}</style><rect width="1080" height="1920" fill="#efe7dc"/><image href="03-older-brother-younger-brother.png" x="0" y="0" width="1080" height="1824" preserveAspectRatio="xMidYMin slice"/><rect x="28" y="970" width="1024" height="894" rx="46" fill="#fcf8f2" fill-opacity="0.96" stroke="#e0d0bd" stroke-width="2"/><rect x="56" y="54" width="240" height="52" rx="24" fill="#f4b76e"/><text x="74" y="89" class="chip">FAMILY MEMBERS</text><text x="58" y="1052" class="heading">Family Members in Thai</text><rect x="52" y="1080" width="468" height="784" rx="28" fill="#fffaf4" stroke="#e6d7c7" stroke-width="2"/><text x="80" y="1134" class="en"><tspan x="80" dy="0">Older Brother</tspan></text><text x="80" y="1198" class="thai" id="left-thai">พี่ชาย</text><text x="80" y="1252" class="translit"><tspan x="80" dy="0">phîi-chaai</tspan></text><text x="80" y="1300" class="small" id="left-breakdown-0">พี่ = older sibling (phîi)</text><text x="80" y="1334" class="small" id="left-breakdown-1">ชาย = male (chaai)</text><text x="80" y="1382" class="example"><tspan x="80" dy="0">พี่ชายของฉันใจดี</tspan></text><text x="80" y="1424" class="small"><tspan x="80" dy="0">phîi-chaai khǎawng chǎn jai-dii</tspan></text><text x="80" y="1462" class="small"><tspan x="80" dy="0">My older brother is kind.</tspan></text><rect x="560" y="1080" width="468" height="784" rx="28" fill="#fffaf4" stroke="#e6d7c7" stroke-width="2"/><text x="588" y="1134" class="en"><tspan x="588" dy="0">Younger Brother</tspan></text><text x="588" y="1198" class="thai" id="right-thai">น้องชาย</text><text x="588" y="1252" class="translit"><tspan x="588" dy="0">náawng-chaai</tspan></text><text x="588" y="1300" class="small" id="right-breakdown-0">น้อง = younger sibling (náawng)</text><text x="588" y="1334" class="small" id="right-breakdown-1">ชาย = male (chaai)</text><text x="588" y="1382" class="example"><tspan x="588" dy="0">น้องชายของฉันตลกมาก</tspan></text><text x="588" y="1424" class="small"><tspan x="588" dy="0">náawng-chaai khǎawng chǎn dtà-lòk mâak</tspan></text><text x="588" y="1462" class="small"><tspan x="588" dy="0">My younger brother is very funny.</tspan></text></svg>