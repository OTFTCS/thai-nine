<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920"><style>.chip{font:700 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#4b2e1f}.heading{font:700 36px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#1f1a17}.title{font:700 78px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#1f1a17}.thai-title{font:700 54px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#b45d13}.en{font:700 30px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#8f4a11}.thai{font:700 44px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.thai-large{font:700 52px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.translit{font:400 26px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#5f524a}.translit-large{font:400 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#5f524a}.small{font:400 22px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#443832}.small-large{font:400 24px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#443832}.example{font:700 26px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.example-large{font:700 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.body{font:400 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#6d5f56}.body-small{font:400 24px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#5f524a}</style><rect width="1080" height="1920" fill="#efe7dc"/><image href="01-cover-family-members.png" x="0" y="0" width="1080" height="1824" preserveAspectRatio="xMidYMin slice"/><rect x="28" y="970" width="1024" height="894" rx="46" fill="#fcf8f2" fill-opacity="0.96" stroke="#e0d0bd" stroke-width="2"/><rect x="56" y="54" width="240" height="52" rx="24" fill="#f4b76e"/><text x="74" y="89" class="chip">THAI WITH NINE</text><text x="84" y="1138" class="title">Family Members in Thai</text><text x="84" y="1222" class="thai-title">คนในครอบครัว</text><text x="84" y="1292" class="body">khon nai khrâawp-khruua</text><text x="84" y="1350" class="body">คน = person (khon)</text><text x="84" y="1392" class="body">ใน = in (nai)</text><text x="84" y="1434" class="body">ครอบครัว = family (khrâawp-khruua)</text><text x="84" y="1502" class="example">ครอบครัวของฉันใหญ่มาก</text><text x="84" y="1544" class="body">khrâawp-khruua khǎawng chǎn yài mâak</text><text x="84" y="1586" class="body">My family is very big.</text></svg>