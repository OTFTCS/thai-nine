<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920"><style>.chip{font:700 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#4b2e1f}.heading{font:700 36px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#1f1a17}.title{font:700 78px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#1f1a17}.thai-title{font:700 54px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#b45d13}.en{font:700 30px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#8f4a11}.thai{font:700 44px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.thai-large{font:700 52px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.translit{font:400 26px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#5f524a}.translit-large{font:400 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#5f524a}.small{font:400 22px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#443832}.small-large{font:400 24px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#443832}.example{font:700 26px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.example-large{font:700 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#201913}.body{font:400 28px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#6d5f56}.body-small{font:400 24px Tahoma,Thonburi,Arial Unicode MS,sans-serif;fill:#5f524a}</style><rect width="1080" height="1920" fill="#efe7dc"/><image href="09-cousins.png" x="0" y="0" width="1080" height="1824" preserveAspectRatio="xMidYMin slice"/><rect x="28" y="970" width="1024" height="894" rx="46" fill="#fcf8f2" fill-opacity="0.96" stroke="#e0d0bd" stroke-width="2"/><rect x="56" y="54" width="240" height="52" rx="24" fill="#f4b76e"/><text x="74" y="89" class="chip">FAMILY MEMBERS</text><text x="58" y="1052" class="heading">Family Members in Thai</text><rect x="74" y="1096" width="932" height="760" rx="34" fill="#fffaf4" stroke="#e6d7c7" stroke-width="2"/><text x="108" y="1152" class="en"><tspan x="108" dy="0">Cousins</tspan></text><text x="108" y="1224" class="thai-large">ลูกพี่ลูกน้อง</text><text x="108" y="1290" class="translit-large"><tspan x="108" dy="0">lûuk-phîi-lûuk-náawng</tspan></text><text x="108" y="1342" class="small-large" id="breakdown-0">ลูก = child (lûuk)</text><text x="108" y="1380" class="small-large" id="breakdown-1">พี่ = older sibling (phîi)</text><text x="108" y="1418" class="small-large" id="breakdown-2">ลูก = child (lûuk)</text><text x="108" y="1456" class="small-large" id="breakdown-3">น้อง = younger sibling (náawng)</text><text x="108" y="1516" class="example-large"><tspan x="108" dy="0">ฉันมีลูกพี่ลูกน้องหลายคน</tspan></text><text x="108" y="1564" class="body-small"><tspan x="108" dy="0">chǎn mii lûuk-phîi-lûuk-náawng lǎai khon</tspan></text><text x="108" y="1606" class="body-small"><tspan x="108" dy="0">I have many cousins.</tspan></text></svg>