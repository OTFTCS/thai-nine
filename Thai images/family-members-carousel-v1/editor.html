<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Members Carousel Editor</title>
  <style>
    :root {
      --bg: #f3ede4;
      --panel: #fffaf4;
      --line: #dccab4;
      --text: #201913;
      --muted: #6a5a4f;
      --accent: #a95d1b;
      --chip: #efb264;
      --shadow: 0 18px 40px rgba(57, 39, 24, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Tahoma, Thonburi, "Arial Unicode MS", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f7f2eb 0%, #efe6da 100%);
    }

    .app {
      display: grid;
      grid-template-columns: 280px minmax(540px, 1fr) 320px;
      min-height: 100vh;
    }

    .sidebar,
    .inspector {
      padding: 20px;
      overflow: auto;
      border-right: 1px solid rgba(96, 74, 49, 0.12);
      background: rgba(255, 250, 244, 0.8);
      backdrop-filter: blur(10px);
    }

    .inspector {
      border-right: 0;
      border-left: 1px solid rgba(96, 74, 49, 0.12);
    }

    .main {
      min-width: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .panel-title {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #201913;
      color: white;
      cursor: pointer;
      font: inherit;
    }

    button.secondary {
      background: #eadcc9;
      color: #3f2e1c;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .slides {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .slide-item {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 10px;
      padding: 8px;
      border: 1px solid rgba(96, 74, 49, 0.12);
      border-radius: 16px;
      background: white;
      cursor: pointer;
    }

    .slide-item.active {
      border-color: #c98536;
      box-shadow: 0 0 0 2px rgba(201, 133, 54, 0.16);
    }

    .slide-thumb {
      width: 68px;
      height: 112px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(96, 74, 49, 0.08);
    }

    .slide-meta {
      display: grid;
      gap: 4px;
      align-content: center;
    }

    .slide-number {
      font-size: 12px;
      color: var(--muted);
    }

    .slide-name {
      font-size: 14px;
      line-height: 1.35;
      font-weight: 700;
    }

    .stage-shell {
      flex: 1;
      min-height: 0;
      border-radius: 28px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.44);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      overflow: auto;
    }

    .stage-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .stage {
      position: relative;
      width: 1080px;
      height: 1920px;
      transform-origin: top center;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #efe7dc;
      user-select: none;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.98);
    }

    .fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 248, 239, 0.08) 0%, rgba(255, 248, 239, 0.22) 65%, rgba(255, 248, 239, 0.3) 100%);
    }

    .panel {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 28px;
      top: 820px;
      border-radius: 46px;
      background: rgba(252, 248, 242, 0.96);
      border: 2px solid var(--line);
      box-shadow: 0 14px 22px rgba(86, 59, 36, 0.08);
    }

    .pair-card,
    .single-card {
      position: absolute;
      border-radius: 28px;
      background: #fffaf4;
      border: 2px solid #e6d7c7;
    }

    .pair-card.left {
      left: 52px;
      top: 930px;
      width: 468px;
      height: 934px;
    }

    .pair-card.right {
      left: 560px;
      top: 930px;
      width: 468px;
      height: 934px;
    }

    .single-card {
      left: 74px;
      top: 946px;
      width: 932px;
      height: 910px;
      border-radius: 34px;
    }

    .text-box {
      position: absolute;
      min-width: 90px;
      max-width: 460px;
      border: 1px dashed transparent;
      border-radius: 16px;
      padding: 12px 12px 10px;
      background: rgba(255, 255, 255, 0);
    }

    .text-box.selected {
      border-color: #c98536;
      background: rgba(255, 247, 236, 0.92);
      box-shadow: 0 0 0 2px rgba(201, 133, 54, 0.14);
    }

    .box-handle {
      display: none;
      width: 100%;
      border-radius: 10px;
      margin-bottom: 8px;
      padding: 6px 8px;
      background: #f0dfcb;
      color: #684326;
      font-size: 11px;
      line-height: 1;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: grab;
    }

    .text-box.selected .box-handle {
      display: block;
    }

    .box-content {
      outline: none;
      cursor: text;
      white-space: pre-wrap;
      user-select: text;
    }

    .type-chip .box-content {
      font-size: 28px;
      font-weight: 700;
      color: #4b2e1f;
      background: var(--chip);
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
    }

    .type-heading .box-content {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.15;
    }

    .type-cover-title .box-content {
      font-size: 78px;
      font-weight: 700;
      line-height: 1.04;
    }

    .type-cover-thai .box-content {
      font-size: 54px;
      font-weight: 700;
      line-height: 1.08;
      color: var(--accent);
    }

    .type-en .box-content {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.18;
      color: var(--accent);
    }

    .type-thai .box-content {
      font-size: 44px;
      font-weight: 700;
      line-height: 1.1;
    }

    .type-thai-large .box-content {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
    }

    .type-translit .box-content {
      font-size: 26px;
      line-height: 1.24;
      color: var(--muted);
    }

    .type-translit-large .box-content {
      font-size: 28px;
      line-height: 1.24;
      color: var(--muted);
    }

    .type-breakdown .box-content {
      font-size: 22px;
      line-height: 1.35;
      color: #443832;
    }

    .type-breakdown-large .box-content {
      font-size: 24px;
      line-height: 1.4;
      color: #443832;
    }

    .type-example .box-content {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.25;
    }

    .type-example-large .box-content {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.25;
    }

    .type-body .box-content {
      font-size: 24px;
      line-height: 1.35;
      color: var(--muted);
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid rgba(96, 74, 49, 0.18);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: white;
      color: var(--text);
    }

    .field textarea {
      min-height: 86px;
      resize: vertical;
    }

    .hint {
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    @media (max-width: 1320px) {
      .app {
        grid-template-columns: 250px 1fr;
      }

      .inspector {
        display: none;
      }
    }

    @media (max-width: 960px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(96, 74, 49, 0.12);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="panel-title">Slides</div>
      <div class="slides" id="slides"></div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <button id="saveBtn" class="secondary">Save To Browser</button>
        <button id="resetSlideBtn" class="secondary">Reset Slide</button>
        <button id="resetAllBtn" class="secondary">Reset All</button>
        <button id="exportBtn">Download Layout JSON</button>
        <span class="status" id="status">Ready</span>
      </div>

      <div class="stage-shell">
        <div class="stage-wrap">
          <div class="stage" id="stage"></div>
        </div>
      </div>
    </main>

    <aside class="inspector">
      <div class="panel-title">Selected Box</div>
      <div class="field">
        <label for="boxId">Box ID</label>
        <input id="boxId" readonly>
      </div>
      <div class="field">
        <label for="boxType">Type</label>
        <input id="boxType" readonly>
      </div>
      <div class="field">
        <label for="boxX">X</label>
        <input id="boxX" type="number">
      </div>
      <div class="field">
        <label for="boxY">Y</label>
        <input id="boxY" type="number">
      </div>
      <div class="field">
        <label for="boxWidth">Width</label>
        <input id="boxWidth" type="number">
      </div>
      <div class="field">
        <label for="boxText">Text</label>
        <textarea id="boxText"></textarea>
      </div>
      <p class="hint">
        Drag boxes using the small handle that appears when selected. Click the text to edit it directly.
        Use the inspector if you want exact coordinates or width values.
      </p>
    </aside>
  </div>

    };

    let state = loadState();
    let currentSlideId = state.currentSlideId || 1;
    let selectedBoxId = null;
    let dragState = null;

    const slidesEl = document.getElementById("slides");
    const stageEl = document.getElementById("stage");
    const statusEl = document.getElementById("status");

    const fields = {
      id: document.getElementById("boxId"),
      type: document.getElementById("boxType"),
      x: document.getElementById("boxX"),
      y: document.getElementById("boxY"),
      width: document.getElementById("boxWidth"),
      text: document.getElementById("boxText")
    };

    function cloneSlides(slides) {
      return JSON.parse(JSON.stringify(slides));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (error) {
      }
      return {
        currentSlideId: 1,
        slides: cloneSlides(carousel.slides)
      };
    }

    function saveState(label = "Saved") {
      state.currentSlideId = currentSlideId;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setStatus(label);
    }

    function setStatus(text) {
      statusEl.textContent = text;
      clearTimeout(setStatus.timer);
      setStatus.timer = setTimeout(() => {
        statusEl.textContent = "Ready";
      }, 1800);
    }

    function currentSlide() {
      return state.slides.find((slide) => slide.id === currentSlideId);
    }

    function renderSlidesList() {
      slidesEl.innerHTML = "";
      state.slides.forEach((slide) => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "slide-item" + (slide.id === currentSlideId ? " active" : "");
        item.innerHTML = `
          <div class="slide-thumb" style="background-image:url('${slide.image}')"></div>
          <div class="slide-meta">
            <div class="slide-number">Slide ${slide.id}</div>
            <div class="slide-name">${slide.name}</div>
          </div>
        `;
        item.addEventListener("click", () => {
          currentSlideId = slide.id;
          selectedBoxId = null;
          render();
        });
        slidesEl.appendChild(item);
      });
    }

    function render() {
      renderSlidesList();
      renderStage();
      updateScale();
      updateInspector();
    }

    function renderStage() {
      const slide = currentSlide();
      stageEl.innerHTML = "";
      stageEl.appendChild(createImage(slide.image));
      stageEl.appendChild(el("div", { className: "fade" }));
      stageEl.appendChild(el("div", { className: "panel" }));
      if (slide.kind === "pair") {
        stageEl.appendChild(el("div", { className: "pair-card left" }));
        stageEl.appendChild(el("div", { className: "pair-card right" }));
      }
      if (slide.kind === "single") {
        stageEl.appendChild(el("div", { className: "single-card" }));
      }
      slide.boxes.forEach((box) => stageEl.appendChild(createTextBox(box)));
    }

    function createImage(src) {
      const img = document.createElement("img");
      img.className = "bg-image";
      img.src = src;
      img.alt = "";
      return img;
    }

    function createTextBox(box) {
      const node = el("div", {
        className: `text-box type-${box.type}` + (selectedBoxId === box.id ? " selected" : ""),
        style: `left:${box.x}px; top:${box.y}px; width:${box.w}px;`
      });
      node.dataset.id = box.id;
      node.dataset.type = box.type;

      const handle = el("div", { className: "box-handle", textContent: box.id.replace(/([A-Z])/g, " $1").trim() });
      const content = el("div", { className: "box-content", contentEditable: "true", spellcheck: "false" });
      content.textContent = box.text;

      handle.addEventListener("pointerdown", (event) => startDrag(event, box.id));
      node.addEventListener("click", (event) => {
        if (selectedBoxId !== box.id) {
          selectedBoxId = box.id;
          render();
        }
        event.stopPropagation();
      });
      content.addEventListener("input", () => {
        box.text = content.textContent;
        if (selectedBoxId === box.id) updateInspector();
      });
      content.addEventListener("focus", () => {
        if (selectedBoxId !== box.id) {
          selectedBoxId = box.id;
          render();
        }
      });

      node.appendChild(handle);
      node.appendChild(content);
      return node;
    }

    function startDrag(event, boxId) {
      event.preventDefault();
      event.stopPropagation();
      const slide = currentSlide();
      const box = slide.boxes.find((item) => item.id === boxId);
      selectedBoxId = boxId;
      dragState = {
        box,
        startX: event.clientX,
        startY: event.clientY,
        originX: box.x,
        originY: box.y
      };
      render();
      event.target.setPointerCapture(event.pointerId);
    }

    function onPointerMove(event) {
      if (!dragState) return;
      const scale = currentScale();
      const dx = (event.clientX - dragState.startX) / scale;
      const dy = (event.clientY - dragState.startY) / scale;
      dragState.box.x = Math.round(dragState.originX + dx);
      dragState.box.y = Math.round(dragState.originY + dy);
      const boxNode = stageEl.querySelector(`.text-box[data-id="${dragState.box.id}"]`);
      if (boxNode) {
        boxNode.style.left = dragState.box.x + "px";
        boxNode.style.top = dragState.box.y + "px";
      }
      updateInspector();
    }

    function onPointerUp() {
      if (!dragState) return;
      dragState = null;
      saveState("Position updated");
    }

    function currentScale() {
      const transform = getComputedStyle(stageEl).transform;
      if (!transform || transform === "none") return 1;
      const parts = transform.match(/matrix\(([^)]+)\)/);
      if (!parts) return 1;
      return parseFloat(parts[1].split(",")[0]) || 1;
    }

    function updateScale() {
      const shell = document.querySelector(".stage-shell");
      const available = shell.clientWidth - 40;
      const scale = Math.min(1, available / 1080);
      stageEl.style.transform = `scale(${scale})`;
      stageEl.parentElement.style.height = (1920 * scale) + "px";
    }

    function selectedBox() {
      const slide = currentSlide();
      return slide.boxes.find((box) => box.id === selectedBoxId) || null;
    }

    function updateInspector() {
      const box = selectedBox();
      fields.id.value = box ? box.id : "";
      fields.type.value = box ? box.type : "";
      fields.x.value = box ? box.x : "";
      fields.y.value = box ? box.y : "";
      fields.width.value = box ? box.w : "";
      fields.text.value = box ? box.text : "";
      [fields.x, fields.y, fields.width, fields.text].forEach((field) => {
        field.disabled = !box;
      });
    }

    function updateSelectedFromInspector() {
      const box = selectedBox();
      if (!box) return;
      box.x = parseInt(fields.x.value || box.x, 10);
      box.y = parseInt(fields.y.value || box.y, 10);
      box.w = parseInt(fields.width.value || box.w, 10);
      box.text = fields.text.value;
      renderStage();
      updateInspector();
    }

    function resetSlide() {
      const source = carousel.slides.find((slide) => slide.id === currentSlideId);
      const target = state.slides.find((slide) => slide.id === currentSlideId);
      target.boxes = cloneSlides(source.boxes);
      selectedBoxId = null;
      saveState("Slide reset");
      render();
    }

    function resetAll() {
      state.slides = cloneSlides(carousel.slides);
      selectedBoxId = null;
      saveState("All slides reset");
      render();
    }

    function downloadLayout() {
      const payload = {
        title: carousel.title,
        savedAt: new Date().toISOString(),
        slides: state.slides
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "family-members-carousel-layout.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus("Layout downloaded");
    }

    function el(tag, props = {}) {
      const node = document.createElement(tag);
      Object.entries(props).forEach(([key, value]) => {
        if (key === "className") node.className = value;
        else if (key === "style") node.style.cssText = value;
        else if (key === "textContent") node.textContent = value;
        else node.setAttribute(key, value);
      });
      return node;
    }

    document.getElementById("saveBtn").addEventListener("click", () => saveState());
    document.getElementById("resetSlideBtn").addEventListener("click", resetSlide);
    document.getElementById("resetAllBtn").addEventListener("click", resetAll);
    document.getElementById("exportBtn").addEventListener("click", downloadLayout);

    [fields.x, fields.y, fields.width].forEach((field) => {
      field.addEventListener("input", updateSelectedFromInspector);
    });
    fields.text.addEventListener("input", updateSelectedFromInspector);

    stageEl.addEventListener("click", () => {
      selectedBoxId = null;
      render();
    });

    window.addEventListener("pointermove", onPointerMove);
    window.addEventListener("pointerup", onPointerUp);
    window.addEventListener("resize", updateScale);

    render();
  </script>
